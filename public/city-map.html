<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>城市精酿地图 - Beer Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f0f23);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 顶部导航 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-bar h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .back-btn {
            position: absolute;
            left: 16px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        
        /* 城市选择 */
        .city-selector {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            padding: 16px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            z-index: 90;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .city-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .city-btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .city-btn.active {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            border-color: #ff1493;
        }
        .city-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        /* 地图区域 */
        .map-container {
            position: fixed;
            top: 130px;
            left: 10px;
            right: 10px;
            bottom: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .map-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 底部提示 */
        .map-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 8px;
            border-radius: 12px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 60px;
        }
        .nav-btn .icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        .nav-btn.active {
            color: #ff1493;
        }
        .nav-btn.accent {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700;
            box-shadow: 0 4px 30px rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.3);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>🗺️ 城市精酿地图</h1>
    </div>
    
    <!-- 城市选择 -->
    <div class="city-selector">
        <div class="city-list">
            <button class="city-btn active" onclick="selectCity('shanghai')">上海</button>
            <button class="city-btn disabled">北京</button>
            <button class="city-btn disabled">深圳</button>
            <button class="city-btn disabled">广州</button>
            <button class="city-btn disabled">成都</button>
            <button class="city-btn disabled">杭州</button>
            <button class="city-btn disabled">南京</button>
            <button class="city-btn disabled">武汉</button>
        </div>
    </div>
    
    <!-- 地图区域 -->
    <div class="map-container" id="mapContainer">
        <img src="shanghai-map.png" alt="上海精酿地图" />
    </div>
    
    <!-- 底部提示 -->
    <div class="map-hint">点击地图上的精酿酒吧标记查看详情</div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='index.html'">
            <span class="icon">🍺</span>
            <span>喝啤酒</span>
        </button>
        <button class="nav-btn accent" onclick="window.location.href='wine.html'">
            <span class="icon">🍷</span>
            <span>喝葡萄酒</span>
        </button>
    </div>
    
    <script>
        function selectCity(city) {
            // 更新按钮状态
            document.querySelectorAll('.city-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 更新地图
            const mapContainer = document.getElementById('mapContainer');
            if (city === 'shanghai') {
                mapContainer.innerHTML = '<img src="shanghai-map.png" alt="上海精酿地图" />';
            } else {
                mapContainer.innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;"><p>🚧 ' + city.toUpperCase() + ' 地图正在制作中...</p></div>';
            }
        }
    </script>
</body>
</html>
