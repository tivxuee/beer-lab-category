<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索精酿 - Beer Lab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f0f23);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* 顶部导航 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .top-bar h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .back-btn {
            position: absolute;
            left: 16px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        
        /* 模式切换 */
        .mode-switch {
            position: fixed;
            top: 56px;
            left: 0;
            right: 0;
            padding: 10px 12px;
            background: rgba(26, 26, 46, 0.98);
            z-index: 90;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }
        .mode-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            border-color: #ff1493;
            color: #fff;
        }
        
        /* 城市选择器 */
        .city-selector {
            position: relative;
        }
        .city-current {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
        }
        .city-current .arrow {
            font-size: 10px;
        }
        .city-current.open .arrow {
            transform: rotate(180deg);
        }
        .city-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 4px;
            background: rgba(26, 26, 46, 0.98);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            overflow: hidden;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
        }
        .city-dropdown.open {
            display: block;
        }
        .city-dropdown-item {
            padding: 8px 14px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            cursor: pointer;
        }
        .city-dropdown-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .city-dropdown-item.active {
            background: linear-gradient(135deg, #ff1493, #ff69b4);
            color: #fff;
        }
        
        /* 精酿店列表 */
        .brewery-list {
            display: none;
            padding: 12px 16px;
            padding-bottom: 80px;
        }
        .brewery-list.active {
            display: block;
        }
        .brewery-city-name {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
            padding-top: 8px;
        }
        .brewery-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .brewery-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .brewery-style {
            font-size: 12px;
            color: #ff1493;
            margin-bottom: 4px;
        }
        .brewery-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: 120px;
        }
        
        /* 地图区域 */
        .map-container {
            display: none;
            padding: 10px;
        }
        .map-container.active {
            display: block;
        }
        .map-box {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 180px);
        }
        .map-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 世界产区 */
        .region-container {
            display: none;
            padding: 12px 16px;
            padding-bottom: 80px;
        }
        .region-container.active {
            display: block;
        }
        .region-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .region-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .region-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .region-card .flag {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .flag-img {
            width: 40px;
            height: 28px;
            border-radius: 4px;
            vertical-align: middle;
        }
        .region-card .name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .region-card .style {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        /* 产区详情弹窗 */
        .region-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 200;
            overflow-y: auto;
        }
        .region-modal.active {
            display: block;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .modal-back {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 4px;
        }
        .modal-title {
            font-size: 22px;
            font-weight: 600;
        }
        .modal-flag {
            font-size: 36px;
        }
        .modal-intro {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: rgba(255,255,255,0.8);
        }
        .modal-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #ff1493;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .style-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .style-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .style-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .brewery-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .brewery-tag {
            background: rgba(255,215,0,0.2);
            color: #ffd700;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            padding: 8px 8px;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 8px;
            border-radius: 12px;
            border: none;
            background: none;
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 60px;
        }
        .nav-btn .icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        .nav-btn.active {
            color: #ff1493;
        }
        .nav-btn.accent {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ffd700;
            box-shadow: 0 4px 30px rgba(255,215,0,0.2);
            border: 1px solid rgba(255,215,0,0.3);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='wine-map.html'">←</button>
        <h1>🌍 探索精酿</h1>
    </div>
    
    <!-- 模式切换 + 城市选择 -->
    <div class="mode-switch">
        <button class="mode-btn active" onclick="switchMode('city', this)">
            <span>🗺️</span>
            <span>城市精酿店</span>
        </button>
        <button class="mode-btn" onclick="switchMode('world', this)">
            <span>🌍</span>
            <span>世界产区</span>
        </button>
        <div class="city-selector" id="citySelector">
            <div class="city-current" onclick="toggleCityDropdown()">
                <span id="currentCityName">上海</span>
                <span class="arrow">▼</span>
            </div>
            <div class="city-dropdown" id="cityDropdown">
                <div class="city-dropdown-item active" onclick="selectCity('shanghai')">上海</div>
                <div class="city-dropdown-item" onclick="selectCity('beijing')">北京</div>
                <div class="city-dropdown-item" onclick="selectCity('shenzhen')">深圳</div>

                <div class="city-dropdown-item" onclick="selectCity('chengdu')">成都</div>
                <div class="city-dropdown-item" onclick="selectCity('hangzhou')">杭州</div>
                <div class="city-dropdown-item" onclick="selectCity('nanjing')">南京</div>
                <div class="city-dropdown-item" onclick="selectCity('wuhan')">武汉</div>
            </div>
        </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main-content">
        <!-- 地图区域 -->
        <div class="map-container active" id="mapContainer">
            <div class="map-box">
                <img src="shanghai-map.webp" alt="上海精酿地图" />
            </div>
        </div>
        
        <!-- 城市精酿店列表 -->
        <div class="brewery-list" id="breweryList"></div>
        
        <!-- 世界产区 -->
        <div class="region-container" id="regionContainer">
            <div class="region-grid" id="regionGrid"></div>
        </div>
    </div>
    
    <!-- 产区详情弹窗 -->
    <div class="region-modal" id="regionModal">
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <button class="nav-btn" onclick="window.location.href='index.html'">
            <span class="icon">🍺</span>
            <span>喝啤酒</span>
        </button>
        <button class="nav-btn accent" onclick="window.location.href='wine.html'">
            <span class="icon">🍷</span>
            <span>喝葡萄酒</span>
        </button>
    </div>

                name: '新西兰',
                shortStyle: '本地酒花 · 轻盈派',
                intro: '新西兰拥有独特的本地酒花（如 Nelson Sauvin），以清爽优雅的风格闻名。纯净的水源和创新的酿酒师让新西兰精酿独树一帜。',
                styles: [
                    { name: '新西兰 IPA', desc: '白苏维浓酒花特有的醋栗和热带果香，清新脱俗', tags: ['Garage Project', 'Liberty', '8 Wired'] },
                    { name: '酸艾尔', desc: '自然酸酿，果香活泼，清爽宜人', tags: ['Garage Project', 'Panhead'] },
                    { name: '皮尔森/拉格', desc: '纯净爽口，突出麦芽香', tags: ['Emerson\'s', 'Tui'] }
                ]
            }
        ];
        
        // 模式切换
        function switchMode(mode, btn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const mapContainer = document.getElementById('mapContainer');
            const breweryList = document.getElementById('breweryList');
            const regionContainer = document.getElementById('regionContainer');
            const citySelector = document.getElementById('citySelector');
            
            if (mode === 'city') {
                mapContainer.classList.add('active');
                breweryList.classList.remove('active');
                regionContainer.classList.remove('active');
                citySelector.style.display = 'flex';
            } else {
                mapContainer.classList.remove('active');
                breweryList.classList.remove('active');
                regionContainer.classList.add('active');
                citySelector.style.display = 'none';
            }
        }
        
        // 切换城市下拉
        function toggleCityDropdown() {
            const dropdown = document.getElementById('cityDropdown');
            const current = document.querySelector('.city-current');
            dropdown.classList.toggle('open');
            current.classList.toggle('open');
        }
        
        // 选择城市
        function selectCity(city) {
            const cityNames = {
                shanghai: '上海', beijing: '北京', shenzhen: '深圳', guangzhou: '广州',
                chengdu: '成都', hangzhou: '杭州', nanjing: '南京', wuhan: '武汉'
            };
            
            // 更新当前显示
            document.getElementById('currentCityName').textContent = cityNames[city];
            
            // 更新下拉高亮
            document.querySelectorAll('.city-dropdown-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 关闭下拉
            document.getElementById('cityDropdown').classList.remove('open');
            document.querySelector('.city-current').classList.remove('open');
            
            const mapContainer = document.getElementById('mapContainer');
            const breweryList = document.getElementById('breweryList');
            
            if (city === 'shanghai') {
                mapContainer.style.display = 'block';
                breweryList.classList.remove('active');
            } else {
                mapContainer.style.display = 'none';
                breweryList.classList.add('active');
                renderBreweries(city);
            }
        }
        
        // 点击其他地方关闭下拉
        document.addEventListener('click', function(e) {
            const selector = document.getElementById('citySelector');
            if (!selector.contains(e.target)) {
                document.getElementById('cityDropdown').classList.remove('open');
                document.querySelector('.city-current').classList.remove('open');
            }
        });
        
        // 渲染精酿店列表
        function renderBreweries(city) {
            const list = document.getElementById('breweryList');
            const breweries = cityBreweries[city] || [];
            const cityNames = {
                beijing: '北京', shenzhen: '深圳', guangzhou: '广州',
                chengdu: '成都', hangzhou: '杭州', nanjing: '南京', wuhan: '武汉'
            };
            
            list.innerHTML = `
                <div class="brewery-city-name">${cityNames[city]} 精酿推荐</div>
                ${breweries.map(b => `
                    <div class="brewery-item">
                        <div class="brewery-name">${b.name}</div>
                        <div class="brewery-style">${b.style}</div>
                        <div class="brewery-desc">${b.desc}</div>
                    </div>
                `).join('')}
            `;
        }
        
        // 渲染产区卡片
        function renderRegions() {
            const grid = document.getElementById('regionGrid');
            grid.innerHTML = regions.map(r => `
                <div class="region-card" onclick="showRegion('${r.id}')">
                    <div class="flag">${r.flag}</div>
                    <div class="name">${r.name}</div>
                    <div class="style">${r.shortStyle}</div>
                </div>
            `).join('');
        }
        
        // 显示产区详情
        function showRegion(id) {
            const region = regions.find(r => r.id === id);
            const modal = document.getElementById('regionModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <div class="modal-header">
                    <button class="modal-back" onclick="closeModal()">←</button>
                    <span class="modal-flag">${region.flag}</span>
                    <span class="modal-title">${region.name}</span>
                </div>
                <div class="modal-intro">${region.intro}</div>
                
                <div class="modal-section-title">代表风格</div>
                ${region.styles.map(s => `
                    <div class="style-item">
                        <div class="style-name">${region.flag} ${s.name}</div>
                        <div class="style-desc">${s.desc}</div>
                        <div class="brewery-tags">
                            ${s.tags.map(t => `<span class="brewery-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `).join('')}
            `;
            
            modal.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('regionModal').classList.remove('active');
        }
        
        // 初始化
        renderRegions();
    </script>
</body>
</html>
